# ═══════════════════════════════════════════════════════════════════
# config/local_commands.yaml — Конфигурация локальных команд Сиен 2.0
# ═══════════════════════════════════════════════════════════════════
# Структура каждой команды:
#   enabled: bool               — включить/выключить
#   description: str            — описание
#   handler: str                — Python-обработчик (в handlers/)
#   confidence_threshold: float — минимальный порог уверенности (0-1)
#   keywords: [str]             — ключевые слова для быстрого индекса
#   phrases: [str]              — базовые фразы (generate_synonyms.py расширит до 1000+)
#   regex_patterns: [str]       — дополнительные regex-паттерны
#   extract: [...]              — правила извлечения параметров
# ═══════════════════════════════════════════════════════════════════

