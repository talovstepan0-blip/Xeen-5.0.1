<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Сиен 3.0</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #0f1525;
      --panel: #111827;
      --border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --danger: #ef4444;
      --success: #10b981;
      --radius: 10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-title {
      font-size: 2rem;
      font-weight: bold;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent);
      letter-spacing: 4px;
    }

    .logo-subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 6px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .step-dot.active {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .step-dot.completed {
      background: var(--success);
    }

    .totp-hint {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 12px;
    }

    .back-link {
      display: block;
      text-align: center;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 16px;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-title">СИЕН</div>
        <div class="logo-subtitle">Система v3.0.0</div>
      </div>

      <div class="step-indicator">
        <div class="step-dot active" id="step-1"></div>
        <div class="step-dot" id="step-2"></div>
      </div>

      <div id="error-msg" class="error-message"></div>
      <div id="success-msg" class="success-message"></div>

      <!-- Шаг 1: Логин -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Имя пользователя</label>
          <input 
            type="text" 
            id="username" 
            class="form-input" 
            placeholder="admin"
            autocomplete="username"
            required
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Пароль</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn" id="login-btn">Войти</button>
      </form>

      <!-- Шаг 2: TOTP -->
      <form id="totp-form" class="hidden">
        <div class="form-group">
          <label class="form-label" for="totp-code">Код подтверждения</label>
          <input 
            type="text" 
            id="totp-code" 
            class="form-input" 
            placeholder="123456"
            maxlength="6"
            pattern="[0-9]{6}"
            autocomplete="one-time-code"
            required
          />
          <div class="totp-hint">Введите 6-значный код из вашего TOTP-приложения</div>
        </div>
        <button type="submit" class="btn" id="verify-btn">Подтвердить</button>
        <a href="#" class="back-link" id="back-to-login">← Вернуться ко входу</a>
      </form>

      <!-- Сообщение об успехе -->
      <div id="success-screen" class="hidden" style="text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 16px;">✓</div>
        <div style="color: var(--success); font-size: 1.2rem; margin-bottom: 8px;">
          Вход выполнен
        </div>
        <div style="color: var(--text-muted);">Перенаправление...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = location.protocol === 'file:' ? 'http://localhost:8000' : '';
    
    const loginForm = document.getElementById('login-form');
    const totpForm = document.getElementById('totp-form');
    const successScreen = document.getElementById('success-screen');
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    const backLink = document.getElementById('back-to-login');

    let tempToken = null;

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }

    function hideMessages() {
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
    }

    // Шаг 1: Логин
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Введите имя пользователя и пароль');
        return;
      }

      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Проверка...';

      try {
        const response = await fetch(`${API_BASE}/dashboard/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await response.json();

        if (response.ok) {
          if (data.requires_2fa) {
            // Нужен TOTP
            tempToken = data.temp_token;
            step1.classList.remove('active');
            step1.classList.add('completed');
            step2.classList.add('active');
            loginForm.classList.add('hidden');
            totpForm.classList.remove('hidden');
            document.getElementById('totp-code').focus();
            showSuccess('Введите код из TOTP-приложения');
          } else {
            // Вход без 2FA
            completeLogin(data);
          }
        } else {
          showError(data.detail || 'Неверное имя пользователя или пароль');
        }
      } catch (err) {
        showError('Ошибка подключения к серверу');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    });

    // Шаг 2: TOTP верификация
    totpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const code = document.getElementById('totp-code').value.trim();

      if (!code || !/^\d{6}$/.test(code)) {
        showError('Введите 6-значный код');
        return;
      }

      const btn = document.getElementById('verify-btn');
      btn.disabled = true;
      btn.textContent = 'Проверка...';

      try {
        const response = await fetch(`${API_BASE}/dashboard/api/login/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            temp_token: tempToken,
            code: code 
          }),
        });

        const data = await response.json();

        if (response.ok) {
          completeLogin(data);
        } else {
          showError(data.detail || 'Неверный код подтверждения');
        }
      } catch (err) {
        showError('Ошибка подключения к серверу');
        console.error(err);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Подтвердить';
      }
    });

    function completeLogin(data) {
      step1.classList.remove('active');
      step1.classList.add('completed');
      step2.classList.remove('active');
      step2.classList.add('completed');
      
      loginForm.classList.add('hidden');
      totpForm.classList.add('hidden');
      successScreen.classList.remove('hidden');

      // Сохраняем токен сессии
      if (data.session_token) {
        localStorage.setItem('sien_session', data.session_token);
      }

      // Перенаправление через 1.5 секунды
      setTimeout(() => {
        window.location.href = data.redirect_url || '/dashboard/';
      }, 1500);
    }

    // Возврат к логину
    backLink.addEventListener('click', (e) => {
      e.preventDefault();
      tempToken = null;
      step1.classList.add('active');
      step1.classList.remove('completed');
      step2.classList.remove('active');
      step2.classList.remove('completed');
      loginForm.classList.remove('hidden');
      totpForm.classList.add('hidden');
      hideMessages();
      document.getElementById('password').value = '';
    });

    // Автофокус на поле ввода
    document.getElementById('username').focus();
  </script>
</body>
</html>
