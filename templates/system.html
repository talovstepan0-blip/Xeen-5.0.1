<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сиен 3.0 — Мониторинг системы</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; word-wrap: break-word; overflow-wrap: anywhere; }
  body {
    background: #050a0f;
    color: #d4e2f0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid #1e2d45;
    padding-bottom: 14px;
    margin-bottom: 24px;
  }
  h1 {
    color: #00f5ff;
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
  }
  .nav {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .nav a {
    color: #6a7a8a;
    text-decoration: none;
    border: 1px solid #1e2d45;
    padding: 6px 14px;
    border-radius: 3px;
    transition: all 0.2s;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .nav a:hover {
    color: #00f5ff;
    border-color: #00f5ff;
    box-shadow: 0 0 8px rgba(0, 245, 255, 0.2);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 18px;
  }
  .card {
    background: #090d14;
    border: 1px solid #1e2d45;
    border-radius: 6px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    min-width: 0;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #00f5ff, transparent);
  }
  .label {
    color: #6a7a8a;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .value {
    color: #00f5ff;
    font-size: 28px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(0, 245, 255, 0.4);
    margin-bottom: 6px;
    word-break: break-word;
  }
  .sub {
    color: #a5b5c5;
    font-size: 12px;
    margin-bottom: 12px;
  }
  .bar {
    background: #1e2d45;
    height: 10px;
    border-radius: 5px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #10b981, #00f5ff);
    transition: width 0.6s ease, background 0.4s;
    border-radius: 5px;
  }
  .bar-fill.warn  { background: linear-gradient(90deg, #f59e0b, #ffd700); }
  .bar-fill.crit  { background: linear-gradient(90deg, #ef4444, #ff2d55); }

  .footer {
    margin-top: 30px;
    text-align: center;
    color: #6a7a8a;
    font-size: 11px;
  }

  .refresh-indicator {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .error {
    color: #ef4444;
    padding: 12px;
    border: 1px solid #ef4444;
    border-radius: 4px;
    background: rgba(239, 68, 68, 0.05);
    margin-top: 16px;
  }

  @media (max-width: 600px) {
    body { padding: 14px; }
    h1 { font-size: 18px; letter-spacing: 2px; }
    .value { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚙ МОНИТОРИНГ СИСТЕМЫ</h1>
  <div class="nav">
    <a href="/hud/">HUD</a>
    <a href="/dashboard/profile">Профиль</a>
    <a href="/agents/list">Агенты</a>
  </div>
</div>

<div class="grid">

  <div class="card">
    <div class="label">CPU</div>
    <div class="value" id="cpu-val">— %</div>
    <div class="sub" id="cpu-sub">Загрузка процессора</div>
    <div class="bar"><div class="bar-fill" id="cpu-bar" style="width: 0%"></div></div>
  </div>

  <div class="card">
    <div class="label">RAM</div>
    <div class="value" id="ram-val">— %</div>
    <div class="sub" id="ram-sub">— / — ГБ</div>
    <div class="bar"><div class="bar-fill" id="ram-bar" style="width: 0%"></div></div>
  </div>

  <div class="card">
    <div class="label">VRAM (GPU)</div>
    <div class="value" id="vram-val">—</div>
    <div class="sub" id="vram-sub">GPU</div>
    <div class="bar"><div class="bar-fill" id="vram-bar" style="width: 0%"></div></div>
  </div>

  <div class="card">
    <div class="label">ДИСК</div>
    <div class="value" id="disk-val">— %</div>
    <div class="sub" id="disk-sub">— / — ГБ</div>
    <div class="bar"><div class="bar-fill" id="disk-bar" style="width: 0%"></div></div>
  </div>

</div>

<div id="error-block"></div>

<div class="footer">
  <span class="refresh-indicator"></span>
  Обновление каждые 3 секунды · Сиен 3.0.0
</div>

<script>
function setBar(id, percent) {
  const bar = document.getElementById(id);
  bar.style.width = Math.min(100, percent) + '%';
  bar.classList.remove('warn', 'crit');
  if (percent > 90) bar.classList.add('crit');
  else if (percent > 70) bar.classList.add('warn');
}

async function tick() {
  try {
    const API_BASE = (location.protocol === 'file:' || !location.host)
      ? 'http://localhost:8000' : '';
    const r = await fetch(API_BASE + '/dashboard/api/system/stats', {
      mode: 'cors', credentials: 'omit'
    });
    const d = await r.json();

    if (d.warning || d.error) {
      document.getElementById('error-block').innerHTML =
        '<div class="error">⚠ ' + (d.warning || d.error) + '</div>';
    }

    // CPU
    const cpu = d.cpu_percent || 0;
    document.getElementById('cpu-val').textContent = cpu.toFixed(1) + ' %';
    setBar('cpu-bar', cpu);

    // RAM
    const ramPct = d.ram_percent || 0;
    document.getElementById('ram-val').textContent = ramPct.toFixed(1) + ' %';
    document.getElementById('ram-sub').textContent =
      (d.ram_used_gb || 0).toFixed(2) + ' / ' + (d.ram_total_gb || 0).toFixed(2) + ' ГБ';
    setBar('ram-bar', ramPct);

    // VRAM
    if (d.gpu) {
      const vp = d.gpu.vram_percent || 0;
      document.getElementById('vram-val').textContent = vp.toFixed(1) + ' %';
      document.getElementById('vram-sub').textContent =
        (d.gpu.vram_used_gb || 0).toFixed(2) + ' / ' +
        (d.gpu.vram_total_gb || 0).toFixed(2) + ' ГБ · ' +
        (d.gpu.name || 'GPU');
      setBar('vram-bar', vp);
    } else {
      document.getElementById('vram-val').textContent = '—';
      document.getElementById('vram-sub').textContent = 'GPU не обнаружен';
      setBar('vram-bar', 0);
    }

    // Disk
    const dp = d.disk_percent || 0;
    document.getElementById('disk-val').textContent = dp.toFixed(1) + ' %';
    document.getElementById('disk-sub').textContent =
      (d.disk_used_gb || 0).toFixed(1) + ' / ' + (d.disk_total_gb || 0).toFixed(1) + ' ГБ';
    setBar('disk-bar', dp);
  } catch (e) {
    console.error(e);
    document.getElementById('error-block').innerHTML =
      '<div class="error">Ошибка связи с оркестратором: ' + e.message + '</div>';
  }
}

tick();
setInterval(tick, 3000);
</script>

</body>
</html>
